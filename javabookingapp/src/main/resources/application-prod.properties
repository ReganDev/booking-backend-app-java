# ==========================================
# Production Configuration
# ==========================================

# Server
server.port=${PORT:8080}

# Database (Neon Postgres)
# The host/database endpoint below is not a secret. CREDENTIALS are injected from
# environment variables and must NEVER be committed. Set these in Railway:
#   DATABASE_USERNAME=neondb_owner
#   DATABASE_PASSWORD=<your Neon password>
spring.datasource.url=jdbc:postgresql://ep-polished-feather-abs0n7r2-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration (use environment variables)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.dev.bookingapp=INFO
